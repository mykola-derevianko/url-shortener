<td class="whitespace-nowrap px-4 py-3 text-sm text-slate-700">
  {{ item.id }}
</td>
<td class="max-w-md px-4 py-3 text-sm text-slate-700">
  <a
    class="break-all text-slate-900 underline-offset-4 hover:underline"
    [href]="item.originalUrl"
    target="_blank"
    rel="noreferrer"
  >
    {{ item.originalUrl }}
  </a>
</td>
<td class="whitespace-nowrap px-4 py-3 text-sm text-slate-700">
  <a
    class="text-slate-900 underline-offset-4 hover:underline"
    [href]="redirectUrl"
    target="_blank"
    rel="noreferrer"
  >
    {{ redirectUrl }}
  </a>
</td>
<td class="whitespace-nowrap px-4 py-3 text-sm text-slate-700">
  {{ item.createdByUserId }}
</td>
<td class="whitespace-nowrap px-4 py-3 text-sm text-slate-700">
  {{ formatCreatedAt(item.createdAt) }}
</td>
<td class="whitespace-nowrap px-4 py-3 text-sm text-slate-700">
  <div class="flex flex-wrap gap-2">
    <button
      class="rounded-md border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:border-slate-900 hover:text-slate-900"
      type="button"
      (click)="onDetail()"
    >
      Detail
    </button>

    @if (authService.canDelete(item)) {
      <button
        class="rounded-md border border-rose-200 px-3 py-1.5 text-sm font-medium text-rose-700 transition hover:bg-rose-50"
        type="button"
        (click)="onDelete()"
        [disabled]="deletingId === item.id"
      >
        {{ deletingId === item.id ? 'Deleting...' : 'Delete' }}
      </button>
    }
  </div>
</td>
